replicaCount: 2

image:
  repository: your-registry/task-service
  tag: "latest"

kafka:
  brokers: "kafka-service:9092"

notificationService:
  url: "notification-service:50051"

resources:
  requests:
    memory: "128Mi"
    cpu: "100m"
  limits:
    memory: "256Mi"
    cpu: "500m"

hpa:
  minReplicas: 2
  maxReplicas: 10
  cpuUtilization: 70